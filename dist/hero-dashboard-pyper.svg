      <text x="282" y="206" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="900" fill="#079452">IA</text>
    </g>
    <g transform="translate(780 248)">
      <rect width="342" height="246" rx="16" fill="#ffffff" stroke="#e8eeeb" stroke-width="2"/>
      <rect width="5" height="246" rx="3" fill="#d6f7df"/>
      <text x="28" y="50" class="id">PYP-327</text>
      <text x="28" y="108" class="body">Integração de Pedido ao</text>
      <text x="28" y="145" class="body">Conta Azul</text>
      <rect x="28" y="176" width="126" height="43" rx="11" fill="#f0ecff"/>
      <text x="43" y="205" class="tag">integration</text>
      <circle cx="295" cy="198" r="25" fill="#d9fbef"/>
      <text x="281" y="207" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="900" fill="#079452">DS</text>
    </g>
    <g transform="translate(780 522)">
      <rect width="342" height="246" rx="16" fill="#ffffff" stroke="#e8eeeb" stroke-width="2"/>
      <rect width="5" height="246" rx="3" fill="#d6f7df"/>
      <text x="28" y="50" class="id">PYP-499</text>
      <text x="28" y="108" class="body">[N&amp;C] Feature manager:</text>
      <text x="28" y="145" class="body">notify days</text>
      <rect x="28" y="176" width="170" height="43" rx="11" fill="#f0ecff"/>
      <text x="43" y="205" class="tag">change request</text>
      <circle cx="295" cy="198" r="25" fill="#d9fbef"/>
      <text x="284" y="207" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="900" fill="#079452">AI</text>
    </g>
    <g transform="translate(1155 248)">
      <rect width="342" height="246" rx="16" fill="#ffffff" stroke="#e8eeeb" stroke-width="2"/>
      <rect width="5" height="246" rx="3" fill="#d6f7df"/>
      <text x="28" y="50" class="id">PYP-216</text>
      <text x="28" y="108" class="body">[Bug] Card demons para</text>
      <text x="28" y="145" class="body">abrir via não aberto</text>
      <rect x="28" y="176" width="125" height="43" rx="11" fill="#f0ecff"/>
      <text x="43" y="205" class="tag">calendario</text>
      <circle cx="295" cy="198" r="25" fill="#d9fbef"/>
      <text x="280" y="207" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="900" fill="#079452">FM</text>
    </g>
    <g transform="translate(1155 522)">
      <rect width="342" height="246" rx="16" fill="#ffffff" stroke="#e8eeeb" stroke-width="2"/>
      <rect width="5" height="246" rx="3" fill="#d6f7df"/>
      <text x="28" y="50" class="id">PYP-372</text>
      <text x="28" y="108" class="body">Integração com o Online -</text>
      <text x="28" y="145" class="body">Mockupool</text>
      <rect x="28" y="176" width="126" height="43" rx="11" fill="#f0ecff"/>
      <text x="43" y="205" class="tag">integração</text>
      <circle cx="295" cy="198" r="25" fill="#d9fbef"/>
      <text x="281" y="207" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="900" fill="#079452">PX</text>
    </g>
    <g transform="translate(1530 248)">
      <rect width="342" height="246" rx="16" fill="#ffffff" stroke="#e8eeeb" stroke-width="2"/>
      <rect width="5" height="246" rx="3" fill="#d6f7df"/>
      <text x="28" y="50" class="id">PYP-216</text>
      <text x="28" y="108" class="body">Módulo de calendário</text>
      <text x="28" y="145" class="body">interno com filtros</text>
      <rect x="28" y="176" width="74" height="43" rx="11" fill="#f0ecff"/>
      <text x="43" y="205" class="tag">infra</text>
    </g>
    <g transform="translate(1530 522)">
      <rect width="342" height="246" rx="16" fill="#ffffff" stroke="#e8eeeb" stroke-width="2"/>
      <rect width="5" height="246" rx="3" fill="#d6f7df"/>
      <text x="28" y="50" class="id">PYP-495</text>
      <text x="28" y="108" class="body">Adicionar regra implícita</text>
      <text x="28" y="145" class="body">nos formulários</text>
      <rect x="28" y="176" width="75" height="43" rx="11" fill="#f0ecff"/>
      <text x="43" y="205" class="tag">forms</text>
    </g>
  </g>
</svg>
