<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard da Pyper</title>
  <desc id="desc">Interface da Pyper com menu lateral, quadro kanban e cards de tarefas.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1a1c1d" flood-opacity="0.08"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="9" stdDeviation="13" flood-color="#1a1c1d" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="sidebar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbfcfb"/>
      <stop offset="100%" stop-color="#f7f9f8"/>
    </linearGradient>
    <linearGradient id="page" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbfcfb"/>
    </linearGradient>
    <style>
      .label{font:700 25px Inter, ui-sans-serif, system-ui, sans-serif;fill:#6d7771}
      .small{font:800 22px Inter, ui-sans-serif, system-ui, sans-serif;fill:#6d7771}
      .body{font:750 29px Inter, ui-sans-serif, system-ui, sans-serif;fill:#26302b}
      .muted{fill:#7b8580}
      .green{fill:#006d3d}
      .tag{font:800 22px Inter, ui-sans-serif, system-ui, sans-serif;fill:#6d50c7}
      .id{font:850 24px Inter, ui-sans-serif, system-ui, sans-serif;fill:#6d7771}
    </style>
  </defs>

  <rect width="1800" height="1040" rx="24" fill="#ffffff"/>
  <rect x="1.5" y="1.5" width="1797" height="1037" rx="22.5" fill="none" stroke="#e2e7e4" stroke-width="3"/>
  <rect x="0" y="0" width="355" height="1040" fill="url(#sidebar)"/>
  <line x1="355" x2="355" y1="0" y2="1040" stroke="#e7ece9" stroke-width="3"/>

  <text x="70" y="118" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="900" letter-spacing="-6" fill="#38ad5f">pyper</text>

  <g transform="translate(70 215)">
    <rect width="240" height="70" rx="15" fill="#e8f8ec"/>
    <rect x="24" y="24" width="24" height="24" rx="5" fill="none" stroke="#006d3d" stroke-width="4"/>
    <text x="66" y="45" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="27" font-weight="850" fill="#006d3d">Quadro</text>
  </g>

  <g class="label">
    <g transform="translate(70 345)">
      <rect width="24" height="24" x="0" y="-22" rx="5" fill="none" stroke="#9ca8a2" stroke-width="4"/>
      <text x="66" y="0">Planejamento</text>
    </g>
    <g transform="translate(70 435)">
      <rect width="24" height="24" x="0" y="-22" rx="5" fill="none" stroke="#9ca8a2" stroke-width="4"/>
      <text x="66" y="0">Brainstorm</text>
    </g>
    <g transform="translate(70 525)">
      <rect width="24" height="24" x="0" y="-22" rx="5" fill="none" stroke="#9ca8a2" stroke-width="4"/>
      <text x="66" y="0">CRMs</text>
    </g>
    <g transform="translate(70 615)">
      <rect width="24" height="24" x="0" y="-22" rx="5" fill="none" stroke="#9ca8a2" stroke-width="4"/>
      <text x="66" y="0">Metas</text>
    </g>
    <g transform="translate(70 705)">
      <rect width="24" height="24" x="0" y="-22" rx="5" fill="none" stroke="#9ca8a2" stroke-width="4"/>
      <text x="66" y="0">Revisões</text>
    </g>
    <g transform="translate(70 795)">
      <rect width="24" height="24" x="0" y="-22" rx="5" fill="none" stroke="#9ca8a2" stroke-width="4"/>
      <text x="66" y="0">Dashboards</text>
    </g>
  </g>

  <rect x="355" y="0" width="1445" height="1040" fill="url(#page)"/>
  <rect x="355" y="0" width="1445" height="138" fill="#ffffff"/>
  <line x1="355" x2="1800" y1="138" y2="138" stroke="#e8eeeb" stroke-width="3"/>

  <text x="405" y="88" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="900" fill="#1a1c1d">Sprint 9</text>
  <rect x="555" y="45" width="160" height="48" rx="24" fill="#e5f8eb"/>
  <text x="580" y="77" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850" fill="#168346">Em andamento</text>

  <text x="775" y="82" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="27" font-weight="900" fill="#006d3d">Quadro</text>
  <rect x="775" y="118" width="90" height="4" rx="2" fill="#69dd96"/>
  <text x="910" y="82" class="label">Lista</text>
  <text x="1018" y="82" class="label">Calendário</text>
  <text x="1205" y="82" class="label">Analytics</text>

  <rect x="1450" y="38" width="300" height="62" rx="16" fill="#ffffff" stroke="#e5ebe8" stroke-width="2"/>
  <circle cx="1487" cy="69" r="12" fill="none" stroke="#a3ada8" stroke-width="4"/>
  <line x1="1498" x2="1511" y1="80" y2="93" stroke="#a3ada8" stroke-width="4" stroke-linecap="round"/>
  <text x="1530" y="78" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="650" fill="#a3ada8">Buscar por título ou código</text>

  <g transform="translate(405 206)">
    <text class="small" x="0" y="0">A fazer</text>
    <circle cx="104" cy="-8" r="22" fill="#eef1ef"/>
    <text x="91" y="0" class="small">13</text>
    <text x="318" y="0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="36" fill="#9ba59f">+</text>
  </g>
  <g transform="translate(780 206)">
    <text class="small" x="0" y="0">Fazendo</text>
    <circle cx="132" cy="-8" r="22" fill="#eef1ef"/>
    <text x="118" y="0" class="small">16</text>
    <text x="330" y="0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="36" fill="#9ba59f">+</text>
  </g>
  <g transform="translate(1155 206)">
    <text class="small" x="0" y="0">Revisão</text>
    <circle cx="116" cy="-8" r="22" fill="#eef1ef"/>
    <text x="106" y="0" class="small">7</text>
    <text x="330" y="0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="36" fill="#9ba59f">+</text>
  </g>
  <g transform="translate(1530 206)">
    <text class="small" x="0" y="0">Resolvido</text>
    <circle cx="146" cy="-8" r="22" fill="#eef1ef"/>
    <text x="136" y="0" class="small">9</text>
  </g>

