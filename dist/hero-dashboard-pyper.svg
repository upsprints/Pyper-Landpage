    <g transform="translate(405 248)">
      <rect width="342" height="262" rx="16" fill="#ffffff" stroke="#e8eeeb" stroke-width="2"/>
      <rect width="5" height="262" rx="3" fill="#d6f7df"/>
      <text x="28" y="50" class="id">PYP-503</text>
      <text x="28" y="105" class="body">[M&amp;S] flow: enhance goal</text>
      <text x="28" y="142" class="body">assignment and template</text>
      <text x="28" y="179" class="body">sync</text>
      <rect x="28" y="210" width="88" height="43" rx="11" fill="#f0ecff"/>
      <text x="43" y="239" class="tag">urgent</text>
      <circle cx="295" cy="232" r="25" fill="#d9fbef"/>
      <text x="280" y="241" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="900" fill="#079452">PR</text>
