      <rect width="5" height="246" rx="3" fill="#d6f7df"/>
      <text x="28" y="50" class="id">PYP-328</text>
      <text x="28" y="106" class="body">Duplicidade de signup no</text>
      <text x="28" y="143" class="body">login no onboarding</text>
      <rect x="28" y="174" width="62" height="43" rx="11" fill="#f0ecff"/>
